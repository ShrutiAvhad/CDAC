<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Teacher Login</title>

<style>

*{
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: "Poppins", sans-serif;
}

body{
	height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;

	background: linear-gradient(
	135deg,
	#d4fc79,
	#96e6a1,
	#a8edea);

	background-size: 300% 300%;
	animation: bgMove 8s ease infinite;
}

.login-card{

	width: 420px;
	padding: 45px 35px;
	border-radius: 30px;

	background: rgba(255,255,255,0.35);

	backdrop-filter: blur(15px);

	border: 2px solid rgba(255,255,255,0.4);

	box-shadow:
	0 10px 35px rgba(0,0,0,0.15),
	0 0 20px rgba(255,255,255,0.3);
}

form{
	display: flex;
	flex-direction: column;
}

h2{
	text-align: center;
	font-size: 34px;
	color: #1b5e20;
	margin-bottom: 35px;
}

label{
	margin-top: 15px;
	margin-bottom: 8px;
	font-weight: 600;
	color: #2e7d32;
}

input{
	padding: 14px;
	border: none;
	border-radius: 14px;
	font-size: 15px;
}

button{
	margin-top: 30px;
	padding: 14px;
	font-size: 17px;
	font-weight: 600;
	color: white;
	border: none;
	border-radius: 50px;
	cursor: pointer;

	background: linear-gradient(
	135deg,
	#43a047,
	#1b5e20);
}

button:hover{
	transform: translateY(-4px);
}

@keyframes bgMove{
	0%{
		background-position: 0% 50%;
	}
	50%{
		background-position: 100% 50%;
	}
	100%{
		background-position: 0% 50%;
	}
}

</style>

</head>

<body>

	<div class="login-card">

		<form action="teacher" method="post">

			<h2>Teacher Login</h2>

			<label>Enter PRN :</label> <input type="number" name="prn"
				placeholder="Enter PRN" required>

			<button type="submit">Login</button>

		</form>

	</div>

</body>

</html>
