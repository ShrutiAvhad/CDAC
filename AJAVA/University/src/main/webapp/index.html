<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Home Page</title>

<script type="text/javascript" src="resources/app.js"></script>

<style>

*{
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: "Poppins", sans-serif;
}

body{
	height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
	background: linear-gradient(135deg, #ffdde1, #ee9ca7, #fcbad3);
	background-size: 300% 300%;
	animation: gradientMove 8s ease infinite;
	padding: 20px;
}

div{
	width: 450px;
	padding: 45px 35px;
	border-radius: 30px;
	text-align: center;

	background: rgba(255,255,255,0.35);
	backdrop-filter: blur(14px);
	-webkit-backdrop-filter: blur(14px);

	border: 2px solid rgba(255,255,255,0.4);

	box-shadow:
		0 10px 35px rgba(255,105,180,0.25),
		0 0 20px rgba(255,255,255,0.2);

	animation: fadeIn 1s ease;
}

h2{
	font-size: 32px;
	font-weight: 700;
	color: #c2185b;
	margin-bottom: 35px;
	letter-spacing: 1px;
	text-shadow: 0 2px 8px rgba(255,255,255,0.6);
}

button{
	margin: 10px;
	padding: 14px 34px;
	font-size: 16px;
	font-weight: 600;
	border: none;
	border-radius: 50px;
	cursor: pointer;
	color: white;

	background: linear-gradient(135deg, #ff6fa5, #ff4f81);

	box-shadow:
		0 6px 18px rgba(255,105,180,0.35),
		inset 0 1px 2px rgba(255,255,255,0.4);

	transition: all 0.35s ease;
	position: relative;
	overflow: hidden;
}

button::before{
	content: "";
	position: absolute;
	top: 0;
	left: -100%;
	width: 100%;
	height: 100%;
	background: rgba(255,255,255,0.3);
	transform: skewX(-25deg);
	transition: 0.5s;
}

button:hover::before{
	left: 120%;
}

button:hover{
	transform: translateY(-5px) scale(1.05);
	background: linear-gradient(135deg, #ff4081, #f50057);
	box-shadow: 0 10px 25px rgba(255,105,180,0.45);
}

button:active{
	transform: scale(0.96);
}

@keyframes fadeIn{
	from{
		opacity: 0;
		transform: translateY(30px);
	}
	to{
		opacity: 1;
		transform: translateY(0);
	}
}	

@keyframes gradientMove{
	0%{
		background-position: 0% 50%;
	}
	50%{
		background-position: 100% 50%;
	}
	100%{
		background-position: 0% 50%;
	}
}
</style>

</head>
<body>

	<div>

		<h2>University Result Application</h2>

		<form action="StudentLogin.html" method="post" style="display:inline;">
			<button type ="submit" value="Student">Student</button>
		</form>

		<form action="TeacherLogin.html" method="post" style="display:inline;">
			<button type ="submit" value="Teacher">Teacher</button>
		</form>

	</div>

</body>
</html>
