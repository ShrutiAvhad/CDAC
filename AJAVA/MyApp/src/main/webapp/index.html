<!DOCTYPE html>
<html>

<head>
<meta charset="ISO-8859-1">
<title>Registration Form</title>

<script type="text/javascript" src="resources/app.js"></script>
<link rel="stylesheet" href="resources/style.css">

</head>

<body>

<h2>Registration Form</h2>
<hr>

<form action="register.html" method="get" name="regForm" onsubmit="return Validate()">

<table border="1">

<tr>
<td>Enter FirstName :</td>
<td><input type="text" name="txtFirstname"></td>
</tr>

<tr>
<td>Enter Password :</td>
<td><input type="password" name="password"></td>
</tr>

<tr>
<td>Enter Email :</td>
<td><input type="email" name="email"></td>
</tr>

<tr>
<td>Select Gender :</td>
<td>
Male <input type="radio" name="gender" value="male">
Female <input type="radio" name="gender" value="female">
</td>
</tr>

<tr>
<td>Select age group :</td>
<td>
<select name="age">
<option value="select" selected="selected">Select</option>
<option value="21-25">21-25</option>
<option value="26-30">26-30</option>
<option value="31-35">31-35</option>
</select>
</td>
</tr>

<tr>
<td><input type="checkbox" name="terms"></td>
<td>Agree terms and conditions !!</td>
</tr>

<tr>
<td>
<input type="button" value="Login"
onclick="location.href='login.html'">
</td>

<td>
<input type="submit" value="Register">
</td>
</tr>

</table>

</form>

</body>
</html>
