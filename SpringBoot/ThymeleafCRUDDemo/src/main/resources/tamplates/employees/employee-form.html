<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Save Employee</title>
</head>

<body>

<h3>Save Employee</h3>

<form th:action="@{/employees/save}"
      th:object="${employee}"
      method="POST">

    <input type="hidden" th:field="*{id}">

    <input type="text"
           th:field="*{firstName}"
           placeholder="First Name">

    <input type="text"
           th:field="*{lastName}"
           placeholder="Last Name">

    <input type="text"
           th:field="*{email}"
           placeholder="Email">

    <button type="submit">Save</button>

</form>

</body>
</html>
