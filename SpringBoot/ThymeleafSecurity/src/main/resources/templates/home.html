<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h2>My Company Home Page</h2>
	<hr>
	<h2>welcome!</h2>

	<hr>

	<p>
		User : <span sec:authentication="principal.username"></span><br>
		<br> Role(s) : <span sec:authentication="principal.authorities"></span>
	</p>

	<p>
	<div sec:authorize="hasRole('MANAGER')">
		<a th:href="@{/leaders}">Leadership Meeting</a> (Only for Manager peeps)
		</p>
	</div>

	<div sec:authorize="hasRole('ADMIN')">
	<p>
		<a th:href="@{/systems}">IT System Meeting</a> (Only for Admin peeps)
	</p>
	</div>

	<form action="#" th:action="@{/logout}" method="post">
		<input type="submit" value="Logout">
	</form>
</body>
</html>
