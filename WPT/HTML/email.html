<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>email</title>
</head>
<body>
    <script>
        let email = prompt("User Id: ")
            document.write(email +"<br>")

        if(email.includes("gmail.com")){
            document.write("It's gmail")
        }
        else if(email.includes("yahoo.com"))
        {
            document.write("It's Yahoo")
        }
        else if(email.includes("hotmail.com"))
        {
            document.write("It's hotmail")
        }
        else
        {
            document.write("Other mail")
        }
        
    </script>
    
</body>
</html>
