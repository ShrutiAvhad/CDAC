<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>

    <style>
		body{
			background-image: url();
            background-color: black;
		}
		
        h2{
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px dashed White;
			color: white;
            border-radius: 50%;
            width: 500px;
            height: 500px;
            margin: auto;
            margin-top: 100px;
			background-image: url(https://i.pinimg.com/1200x/6c/46/9b/6c469b2cfda5da8f0c04ee49c1f93533.jpg); 
			background-size:cover;
			font-size: 30px;
			font-family: serif;
			
        }
    </style>
</head>
<body>
    <h2 id="time"></h2>

    <script>
        function clock(){
            let now = new Date();
            document.getElementById("time").innerHTML = now.toLocaleTimeString();
        }

        setInterval(clock, 1000);
        clock();
    </script>
</body>
</html>
