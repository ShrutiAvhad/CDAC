<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            position: absolute;
            align-items: center;
            margin: auto;
            color: aliceblue;
        }

        .form-container{
            border: 2px solid black;
            padding: 10px;
            text-align: center;
            background-color: black;
            padding-bottom: 18px;
        }

        input{
            margin: 4px;
        }

        label[text]{
            padding-left: 5px;
        }

        div{
            margin: 4px;
        }

    </style>
</head>
<body onload="startTime()">
    <div class="form-container">
        <h3>User Registration</h3>
        <form name="regForm" onsubmit="return validateAll()">
            <label>User Id:</label>
            <input type="text" id="uid" placeholder="eg.user123"><br>

            <label>Username:</label>
            <input type="text" id="uname" placeholder="Enter full name"><br>

            <label>Password:</label>
            <input type="text" id="pass" placeholder="at least 6 chars" onblur="validatePassword()"><br>
            <span id="passError" class="error-msg"></span><br>

            <label>Email Id:</label>
            <input type="text" id="email" placeholder="eg.Example@mail.com"><br>
        
            <label>Contact:</label>
            <input type="text" id="contact" placeholder="10 digit number"><br>
            
            
                <label>Gender:</label>
                <input type="radio" name="gender" value="m" style="width: auto;">Male
                <input type="radio" name="gender" value="f" style="width: auto;">Female<br>

        

        <button type="submit">Submit</button>
        </form>

    </div>

    <script>

        function validatePassword(){
            let pass =  document.getElementById("pass").value;
            let errorSpan = document.getElementById("passError");
            let passInput = document.getElementById("pass");

            if(pass.length < 6){
                errorSpan.innerText = "Too short ! (Min 6 chars)";
                passInput.style.borderColor = "red";
                return false;
            }else{
                errorSpan.innerText="";
                passInput.style.borderColor = "green";
                return true;
            }
        }

        function validateAll(){
            let uid = document.getElementById("uid").value;
            let uname = document.getElementById("uname").value;
            let email = document.getElementById("email").value;
            let contact = document.getElementById("contact").value;
            let gender = document.regForm.gender;

            let uidReg = /^[a-zA-Z0-9]+$/;
            let emailReg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            let contactReg = /^[0-9]{10}$/;

            if (uid === "" || !uidReg.test(uid)){
                alert("User ID is required and must be alphanumeric (no spaces).");
                return false;
            }

            if (uname.length < 3 || uname.length > 15){
                alert("Username must be between 3 and 15 characters.");
                return false;
            }

            if (!emailReg.test(email)){
                alert("Invalid email format");
                return false;
            }

            if (!contactReg.test(contact)){
                alert("contact must be exactly 10 digits");
                return false;
            }

            if (!gender.value){
                alert("Please select a gender");
                return false;
            }

            if (!validatePassword()){
                alert("please fix the password field");
                return false;
            }

            alert("All validations passed ! Form submitted.");
            return true;
        }
    </script>
    
</body>
</html>
