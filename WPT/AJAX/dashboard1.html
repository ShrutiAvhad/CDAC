<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="./dashboard.js" defer></script>

    <style>
        .container{
            margin-bottom: 15px;
        }
        div{
            margin: 2px;
        }
        h3 {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <div class="row">

        <!-- TABLE -->
        <div class="col-md-8">
            <button onclick="getData()" class="btn btn-success mb-3">Load Data</button>

            <table class="table table-bordered table-striped text-center">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>User ID</th>
                        <th>Password</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="d1"></tbody>
            </table>
        </div>

        <!-- DELETE -->
        <div class="col-md-4">
            <h5>Delete User</h5>
            <input type="number" id="deleteId" class="form-control mb-2" placeholder="Enter ID">
            <button onclick="deleteRecord(document.getElementById('deleteId').value)" class="btn btn-danger w-100">
                Delete
            </button>
        </div>

    </div>

    <div class="row mt-4">

        <!-- ADD -->
        <div class="col-md-6">
            <div class="card p-3 shadow-sm">
                <h4>Add User</h4>

                <input type="text" id="add_userid" class="form-control mb-2" placeholder="User ID">
                <input type="text" id="add_upass" class="form-control mb-2" placeholder="Password">

                <button onclick="addData()" class="btn btn-success w-100">Add User</button>
            </div>
        </div>

        <!-- UPDATE -->
        <div class="col-md-6">
            <div class="card p-3 shadow-sm">
                <h4>Update User</h4>

                <input type="number" id="gid" class="form-control mb-2" placeholder="Enter ID to Fetch">
                <button onclick="getSingleId(document.getElementById('gid').value)" class="btn btn-primary mb-2 w-100">
                    Load User
                </button>

                <input type="hidden" id="uid">

                <input type="text" id="userid" class="form-control mb-2" placeholder="User ID">
                <input type="text" id="upass" class="form-control mb-2" placeholder="Password">

                <button onclick="updateRecord()" class="btn btn-warning w-100">
                    Update User
                </button>
            </div>
        </div>

    </div>

</div>

</body>
</html>
